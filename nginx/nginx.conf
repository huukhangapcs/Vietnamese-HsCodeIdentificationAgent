events {
    worker_connections 1024;
}

http {
    # ─── Upstream: FastAPI app (uvicorn) ───────────────────────────────────────
    upstream hscode_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        # Let's Encrypt challenge (certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        # ── SSL/TLS (Let's Encrypt) ──
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security headers ──
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" always;

        # ── Proxy settings ──
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        # ── Rate limiting (nginx-level, bổ sung cho app-level) ──
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;

        # ── SSE endpoint: tắt buffering để stream real-time ──
        location /stream {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass          http://hscode_backend;
            proxy_buffering     off;        # CRITICAL cho SSE
            proxy_cache         off;
            proxy_read_timeout  1800s;      # 30 phút (bằng SESSION_TTL)
            proxy_send_timeout  1800s;
            chunked_transfer_encoding on;
        }

        # ── API endpoints ──
        location ~ ^/(submit_answer|approve_hs|health) {
            proxy_pass http://hscode_backend;
            proxy_read_timeout 30s;
        }

        # ── Frontend (HTML) ──
        location / {
            proxy_pass http://hscode_backend;
            proxy_read_timeout 10s;
        }
    }
}
